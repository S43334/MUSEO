<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Museo Virtual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script src="./nipplejs.min.js"></script>

  <style>
    :root {
      --accent: #f4b241;
      --accent-soft: rgba(244, 178, 65, 0.18);
      --text-main: #f1f1f1;
      --text-soft: #cdcdcd;
      --panel-bg: rgba(8, 11, 20, 0.86);
      --panel-border: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      color: var(--text-main);
    }

    #joystick-zone {
      position: absolute;
      bottom: 20px;
      left: 6px;
      width: 34%;
      height: 46%;
      z-index: 20;
      touch-action: none;
    }

    .overlay-card {
      position: absolute;
      z-index: 30;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      pointer-events: auto;
    }

    #room-menu {
      top: 14px;
      left: 14px;
      width: min(500px, calc(100% - 28px));
      max-height: min(30dvh, 150px);
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px;
      opacity: 0.86;
      scrollbar-width: thin;
    }

    .room-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .room-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .room-btn.active {
      background: var(--accent);
      color: #121212;
      border-color: var(--accent);
      font-weight: 700;
    }

    #artwork-panel {
      right: 14px;
      bottom: 14px;
      width: min(405px, calc(100% - 28px));
      max-height: min(72dvh, 560px);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px;
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      overscroll-behavior: contain;
      transition: opacity 0.26s ease, transform 0.26s ease;
      scrollbar-width: thin;
    }

    #artwork-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #panel-restore {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 35;
      display: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    #panel-restore.visible {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    #panel-title {
      margin: 0;
      color: var(--accent);
      font-size: 1.08rem;
      line-height: 1.25;
    }

    .panel-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .panel-header-actions button {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    #panel-toggle-visibility {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    #artwork-panel p {
      margin: 8px 0;
      color: var(--text-soft);
      font-size: 0.95rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .panel-actions button {
      flex: 1;
      min-width: 120px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      transition: all 0.22s ease;
      font-weight: 700;
    }

    .panel-actions button:hover {
      background: var(--accent);
      color: #121212;
    }

    @media (max-width: 900px) {
      #room-menu {
        top: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        max-height: min(26dvh, 130px);
      }

      #artwork-panel {
        left: 10px;
        right: 10px;
        bottom: 82px;
        width: auto;
        max-height: min(52dvh, 430px);
      }

      #panel-restore {
        right: 10px;
        bottom: 82px;
      }

      #joystick-zone {
        left: 2px;
        bottom: 10px;
        width: 48%;
        height: 40%;
      }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      #room-menu {
        left: 8px;
        top: 8px;
        right: calc(min(405px, 48vw) + 18px);
        width: auto;
        max-height: 64px;
        overflow-y: hidden;
        overflow-x: auto;
        flex-wrap: nowrap;
      }

      .room-btn {
        white-space: nowrap;
      }

      #artwork-panel {
        left: auto;
        top: 8px;
        right: 8px;
        bottom: 8px;
        width: min(405px, 48vw);
        max-height: none;
      }

      #panel-restore {
        top: 8px;
        right: 8px;
        bottom: auto;
      }

      #joystick-zone {
        left: 0;
        bottom: 4px;
        width: 44%;
        height: 56%;
      }
    }

    @media (max-width: 600px) {
      .room-btn {
        font-size: 11.5px;
        padding: 6px 8px;
      }

      .panel-header-actions button {
        padding: 6px 8px;
        font-size: 0.72rem;
      }

      #artwork-panel p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div id="room-menu" class="overlay-card" aria-label="Salto de salas">
    <button class="room-btn" data-room-id="retratos">1. Retratos</button>
    <button class="room-btn" data-room-id="fantasia">2. Fantas&iacute;a</button>
    <button class="room-btn" data-room-id="pop">3. Cultura pop</button>
    <button class="room-btn" data-room-id="tradicion">4. Tradici&oacute;n</button>
  </div>

  <aside id="artwork-panel" class="overlay-card" aria-live="polite">
    <div class="panel-header">
      <h2 id="panel-title">Obra</h2>
      <div class="panel-header-actions">
        <button id="panel-toggle-visibility" type="button">Ocultar ficha</button>
        <button id="panel-close" type="button">Cerrar</button>
      </div>
    </div>
    <p id="panel-author">Artista:</p>
    <p id="panel-section">Secci&oacute;n:</p>
    <p id="panel-technique">T&eacute;cnica:</p>
    <p id="panel-year">A&ntilde;o:</p>
    <p id="panel-description">Descripci&oacute;n:</p>
    <div class="panel-actions">
      <button id="panel-prev" type="button">Anterior</button>
      <button id="panel-next" type="button">Siguiente</button>
    </div>
  </aside>

  <button id="panel-restore" type="button">Mostrar ficha</button>

</body>
