<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Museo Virtual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script src="./nipplejs.min.js"></script>

  <style>
    :root {
      --accent: #f4b241;
      --accent-soft: rgba(244, 178, 65, 0.18);
      --text-main: #f1f1f1;
      --text-soft: #cdcdcd;
      --panel-bg: rgba(8, 11, 20, 0.86);
      --panel-border: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      color: var(--text-main);
    }

    #joystick-zone {
      position: absolute;
      bottom: 20px;
      left: 6px;
      width: 34%;
      height: 46%;
      z-index: 20;
      touch-action: none;
      opacity: 1;
      transition: opacity 0.28s ease;
    }

    #joystick-zone.joystick-idle {
      opacity: 0;
    }

    .overlay-card {
      position: absolute;
      z-index: 30;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      pointer-events: auto;
    }

    #room-menu {
      top: 14px;
      left: 14px;
      width: min(500px, calc(100% - 28px));
      max-height: min(30dvh, 150px);
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px;
      opacity: 0.86;
      scrollbar-width: thin;
    }

    .room-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .room-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .room-btn.active {
      background: var(--accent);
      color: #121212;
      border-color: var(--accent);
      font-weight: 700;
    }

    .room-btn.locked {
      border-color: rgba(244, 178, 65, 0.55);
      color: #f6d6a0;
      background: rgba(244, 178, 65, 0.12);
    }

    .room-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .room-btn.secondary {
      border-color: rgba(255, 255, 255, 0.18);
      color: #d3d7df;
      background: rgba(255, 255, 255, 0.06);
    }

    #artwork-panel {
      right: 14px;
      bottom: 14px;
      width: min(405px, calc(100% - 28px));
      max-height: min(72dvh, 560px);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px;
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      overscroll-behavior: contain;
      transition: opacity 0.26s ease, transform 0.26s ease;
      scrollbar-width: thin;
    }

    #artwork-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #panel-restore {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 35;
      display: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    #panel-restore.visible {
      display: block;
    }

    #artwork-nav {
      left: 0;
      right: 0;
      bottom: 14px;
      height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    #artwork-nav.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #artwork-nav button {
      position: absolute;
      bottom: 0;
      width: 56px;
      min-width: 56px;
      height: 44px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.22s ease;
      font-size: 18px;
      line-height: 1;
      font-weight: 800;
      pointer-events: auto;
    }

    #artwork-nav button:hover:not(:disabled) {
      background: var(--accent);
      color: #121212;
    }

    #artwork-nav button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #nav-prev {
      left: 14px;
    }

    #nav-next {
      right: 14px;
    }

    #private-room-modal[hidden] {
      display: none;
    }

    #private-room-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(2, 5, 12, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 14px;
    }

    .private-modal-card {
      width: min(420px, calc(100% - 28px));
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: rgba(7, 10, 18, 0.95);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.48);
      padding: 16px;
    }

    .private-modal-card h3 {
      margin: 0 0 8px 0;
      color: var(--accent);
      font-size: 1.06rem;
    }

    .private-modal-card p {
      margin: 0 0 12px 0;
      color: #d4d9e0;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    #private-room-password {
      width: 100%;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 0.95rem;
      padding: 10px 12px;
      outline: none;
    }

    #private-room-password:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(244, 178, 65, 0.2);
    }

    #private-room-error {
      min-height: 18px;
      margin: 8px 0 0 0;
      color: #ff8a8a;
      font-size: 0.84rem;
    }

    .private-modal-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .private-modal-actions button {
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 8px 11px;
      cursor: pointer;
      font-weight: 700;
    }

    #private-room-submit {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(244, 178, 65, 0.14);
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    #panel-title {
      margin: 0;
      color: var(--accent);
      font-size: 1.08rem;
      line-height: 1.25;
    }

    .panel-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .panel-header-actions button {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    #panel-toggle-visibility {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    #artwork-panel p {
      margin: 8px 0;
      color: var(--text-soft);
      font-size: 0.95rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    @media (max-width: 900px) {
      #room-menu {
        top: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        max-height: min(26dvh, 130px);
      }

      #artwork-panel {
        left: 10px;
        right: 10px;
        bottom: 82px;
        width: auto;
        max-height: min(52dvh, 430px);
      }

      #panel-restore {
        right: 10px;
        bottom: 82px;
      }

      #artwork-nav {
        bottom: 16px;
      }

      #artwork-nav button {
        width: 52px;
        min-width: 52px;
        height: 42px;
        font-size: 17px;
      }

      #nav-prev {
        left: 10px;
      }

      #nav-next {
        right: 10px;
      }

      #joystick-zone {
        left: 2px;
        bottom: 10px;
        width: 48%;
        height: 40%;
      }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      #room-menu {
        left: 8px;
        top: 8px;
        right: calc(min(405px, 48vw) + 18px);
        width: auto;
        max-height: 64px;
        overflow-y: hidden;
        overflow-x: auto;
        flex-wrap: nowrap;
      }

      .room-btn {
        white-space: nowrap;
      }

      #artwork-panel {
        left: auto;
        top: 8px;
        right: 8px;
        bottom: 8px;
        width: min(405px, 48vw);
        max-height: none;
      }

      #panel-restore {
        top: 8px;
        right: 8px;
        bottom: auto;
      }

      #artwork-nav {
        bottom: 8px;
      }

      #joystick-zone {
        left: 0;
        bottom: 4px;
        width: 44%;
        height: 56%;
      }
    }

    @media (max-width: 600px) {
      .room-btn {
        font-size: 11.5px;
        padding: 6px 8px;
      }

      .panel-header-actions button {
        padding: 6px 8px;
        font-size: 0.72rem;
      }

      #artwork-panel p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div id="room-menu" class="overlay-card" aria-label="Salto de salas"></div>

  <aside id="artwork-panel" class="overlay-card" aria-live="polite">
    <div class="panel-header">
      <h2 id="panel-title">Obra</h2>
      <div class="panel-header-actions">
        <button id="panel-toggle-visibility" type="button">Ocultar ficha</button>
        <button id="panel-close" type="button">Cerrar</button>
      </div>
    </div>
    <p id="panel-author">Artista:</p>
    <p id="panel-section">Secci&oacute;n:</p>
    <p id="panel-technique">T&eacute;cnica:</p>
    <p id="panel-year">A&ntilde;o:</p>
    <p id="panel-description">Descripci&oacute;n:</p>
  </aside>

  <button id="panel-restore" type="button">Mostrar ficha</button>

  <div id="artwork-nav" class="overlay-card" aria-label="Navegaci&oacute;n de obras">
    <button id="nav-prev" type="button" aria-label="Anterior">&lt;-</button>
    <button id="nav-next" type="button" aria-label="Siguiente">-&gt;</button>
  </div>

  <div id="private-room-modal" hidden>
    <div class="private-modal-card" role="dialog" aria-modal="true" aria-labelledby="private-room-title">
      <h3 id="private-room-title">Desbloquear sala privada</h3>
      <p>Ingresa la contraseña para abrir la sala secreta en esta sesión.</p>
      <input id="private-room-password" type="password" autocomplete="off" placeholder="Contraseña" />
      <p id="private-room-error"></p>
      <div class="private-modal-actions">
        <button id="private-room-cancel" type="button">Cancelar</button>
        <button id="private-room-submit" type="button">Desbloquear</button>
      </div>
    </div>
  </div>

</body>
