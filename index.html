<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Museo Virtual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script src="./nipplejs.min.js"></script>

  <style>
    :root {
      --accent: #f4b241;
      --accent-soft: rgba(244, 178, 65, 0.18);
      --text-main: #f1f1f1;
      --text-soft: #cdcdcd;
      --panel-bg: rgba(8, 11, 20, 0.86);
      --panel-border: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      color: var(--text-main);
    }

    #joystick-zone {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 40%;
      height: 50%;
      z-index: 20;
      touch-action: none;
    }

    .overlay-card {
      position: absolute;
      z-index: 30;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      pointer-events: auto;
    }

    #room-menu {
      top: 14px;
      left: 14px;
      width: min(410px, calc(100% - 28px));
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px;
      opacity: 0.86;
    }

    .room-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .room-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .room-btn.active {
      background: var(--accent);
      color: #121212;
      border-color: var(--accent);
      font-weight: 700;
    }

    #artwork-panel {
      right: 14px;
      bottom: 14px;
      width: min(405px, calc(100% - 28px));
      padding: 14px;
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: opacity 0.26s ease, transform 0.26s ease;
    }

    #artwork-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    #panel-title {
      margin: 0;
      color: var(--accent);
      font-size: 1.08rem;
      line-height: 1.25;
    }

    .panel-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-header-actions button {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.75rem;
    }

    #panel-toggle-visibility {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    #artwork-panel p {
      margin: 8px 0;
      color: var(--text-soft);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .panel-actions button {
      flex: 1;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      transition: all 0.22s ease;
      font-weight: 700;
    }

    .panel-actions button:hover {
      background: var(--accent);
      color: #121212;
    }

    #intro-screen {
      position: absolute;
      inset: 0;
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      text-align: center;
      transition: opacity 1s ease;
    }

    #intro-content {
      width: 90%;
      max-width: 620px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 30px;
      border: 1px solid #334;
      background: rgba(12, 16, 30, 0.96);
      box-shadow: 0 0 46px rgba(0, 0, 0, 0.82);
      border-radius: 12px;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      pointer-events: auto;
    }

    #intro-content h1 {
      font-size: 1.8rem;
      margin: 0 0 14px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    #intro-content p {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #cbcbcb;
      margin: 0 0 22px;
      text-align: left;
    }

    #loading-container {
      width: 100%;
      height: 4px;
      background: #3d3d3d;
      margin-bottom: 20px;
      border-radius: 4px;
      overflow: hidden;
    }

    #loading-bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    #loading-text {
      color: #949494;
      font-size: 0.9rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    #start-btn {
      display: none;
      padding: 14px 40px;
      font-size: 1.05rem;
      background: var(--accent-soft);
      color: var(--accent);
      border: 2px solid var(--accent);
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 8px;
      width: 100%;
      max-width: 280px;
      touch-action: manipulation;
      font-weight: 700;
    }

    #start-btn:hover {
      background: var(--accent);
      color: #0d0d0d;
      box-shadow: 0 0 18px rgba(244, 178, 65, 0.6);
    }

    @media (max-width: 900px) {
      #artwork-panel {
        left: 14px;
        right: 14px;
        bottom: 88px;
        width: auto;
      }

      #joystick-zone {
        left: 10px;
        bottom: 10px;
        width: 55%;
        height: 42%;
      }
    }

    @media (max-width: 600px) {
      #intro-content {
        padding: 22px;
      }

      #intro-content h1 {
        font-size: 1.35rem;
      }

      .room-btn {
        font-size: 11.5px;
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>
  <div id="room-menu" class="overlay-card" aria-label="Salto de salas">
    <button class="room-btn" data-room-id="retratos">1. Retratos</button>
    <button class="room-btn" data-room-id="fantasia">2. Fantasía</button>
    <button class="room-btn" data-room-id="pop">3. Cultura pop</button>
    <button class="room-btn" data-room-id="tradicion">4. Tradición</button>
  </div>

  <aside id="artwork-panel" class="overlay-card" aria-live="polite">
    <div class="panel-header">
      <h2 id="panel-title">Obra</h2>
      <div class="panel-header-actions">
        <button id="panel-toggle-visibility" type="button">Ocultar ficha</button>
        <button id="panel-close" type="button">Cerrar</button>
      </div>
    </div>
    <p id="panel-author">Artista:</p>
    <p id="panel-technique">Técnica:</p>
    <p id="panel-year">Año:</p>
    <p id="panel-description">Descripción:</p>
    <div class="panel-actions">
      <button id="panel-prev" type="button">Anterior</button>
      <button id="panel-next" type="button">Siguiente</button>
    </div>
  </aside>

  <div id="intro-screen">
    <div id="intro-content">
      <h1>GALERÍA DE ARTE PARA ISABELLA</h1>
      <p>
        Espero que cada vez que entres aquí te sientas inspirada para seguir dibujando.
      </p>

      <div id="loading-container"><div id="loading-bar"></div></div>
      <div id="loading-text">PREPARANDO LA SALA...</div>
      <button id="start-btn">ENTRAR A LA GALERÍA</button>
    </div>
  </div>

  <div id="joystick-zone"></div>
  <script type="module" src="./src/main.js"></script>

  <script>
    const startBtn = document.getElementById('start-btn');
    const introScreen = document.getElementById('intro-screen');

    const startGame = (event) => {
      if (event) event.preventDefault();
      introScreen.style.opacity = '0';
      setTimeout(() => { introScreen.style.display = 'none'; }, 1000);
    };

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchend', startGame);
  </script>
</body>
</html>
